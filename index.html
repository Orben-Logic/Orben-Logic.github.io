<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Public policies and resources for applications developed by OrbenLogic.">
  <title>OrbenLogic | Public Resources</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #0c0b11;
      --surface: #191720;
      --border: #34303d;
      --text: #f7f2fb;
      --muted: #c6becd;
      --accent: #c5a7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(880px, calc(100% - 40px));
      margin: 0 auto;
      padding: 80px 0;
    }

    .brand {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.86rem;
      font-weight: 750;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 700px;
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 4.7rem);
      line-height: 1.02;
    }

    .intro {
      max-width: 650px;
      margin: 22px 0 48px;
      color: var(--muted);
      font-size: 1.15rem;
      line-height: 1.7;
    }

    .resource {
      display: block;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
    }

    .resource:hover,
    .resource:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .resource h2 { margin: 0 0 8px; font-size: 1.45rem; }
    .resource p { margin: 0; color: var(--muted); line-height: 1.6; }
    .link { display: inline-block; margin-top: 20px; color: var(--accent); font-weight: 700; }

    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="brand">OrbenLogic</p>
    <h1>Public resources</h1>
    <p class="intro">Policies, support information, and other public resources for applications developed by OrbenLogic.</p>

    <a class="resource" href="call-recordings-explorer/">
      <h2>Call Recordings Explorer</h2>
      <p>Privacy information and public resources for the Android application.</p>
      <span class="link">View resources</span>
    </a>

    <footer>&copy; 2026 OrbenLogic</footer>
  </main>
</body>
</html>
